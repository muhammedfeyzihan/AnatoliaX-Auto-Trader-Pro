# ============================================================
# .github/workflows/ci.yml - CI/CD Pipeline (K138)
# ============================================================

name: AnatoliaX CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  python-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          cd PYTHON
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run pytest + coverage
        run: |
          cd PYTHON
          pytest tests/ -v --tb=short --cov=. --cov-report=xml
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: PYTHON/coverage.xml
          fail_ci_if_error: false

  node-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Run Jest
        run: npm test -- --coverage

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Python lint (ruff)
        run: |
          pip install ruff
          ruff check PYTHON/ --select E,W,F
      - name: Node lint
        run: |
          npm ci
          npm run lint

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: main
          head: HEAD
          extra_args: --debug --only-verified

  docker-build:
    runs-on: ubuntu-latest
    needs: [python-test, node-test]
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker images
        run: docker-compose build
      - name: Test Docker compose
        run: |
          docker-compose up -d
          sleep 10
          docker-compose ps
          docker-compose down

  deploy-staging:
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.ref == 'refs/heads/develop'
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to staging
        run: |
          echo "Staging deployment would run here"
          # ssh / kubectl apply etc.
