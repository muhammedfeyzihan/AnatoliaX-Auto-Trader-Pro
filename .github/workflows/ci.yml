# ============================================================
# .github/workflows/ci.yml - CI/CD Pipeline (K138)
# ============================================================

name: AnatoliaX CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  python-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          cd PYTHON
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run critical tests
        run: |
          cd PYTHON
          export PYTHONPATH="$GITHUB_WORKSPACE/PYTHON:$PYTHONPATH"
          pytest tests/test_critical_components.py tests/test_missing_components.py tests/test_knowledge_base.py tests/test_optimal_profit_strategy.py tests/test_master_orchestrator.py tests/test_enums_and_classes.py tests/test_system_optimizer.py -v --tb=short --cov=. --cov-report=xml
      - name: Upload coverage
        uses: codecov/codecov-action@v6
        with:
          files: PYTHON/coverage.xml
          fail_ci_if_error: false

  python-all-tests:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          cd PYTHON
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run all tests
        run: |
          cd PYTHON
          export PYTHONPATH="$GITHUB_WORKSPACE/PYTHON:$PYTHONPATH"
          pytest tests/ -v --tb=short

  lint:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Python lint (ruff)
        run: |
          pip install ruff
          ruff check PYTHON/ --select E,W,F

  security-scan:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha }}

  docker-build:
    runs-on: ubuntu-latest
    needs: [python-test]
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker images
        run: docker-compose build

  deploy-staging:
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.ref == 'refs/heads/develop'
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to staging
        run: |
          echo "Staging deployment would run here"
