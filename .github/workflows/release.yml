# ============================================================
# .github/workflows/release.yml — Release & Publish Pipeline
# ============================================================

name: Release & Publish

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 3.3.0)'
        required: true
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # 1. Python Test (gate)
  python-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          cd PYTHON
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run pytest
        run: |
          cd PYTHON
          pytest tests/ -v --tb=short --cov=. --cov-report=xml
      - name: Upload coverage
        uses: codecov/codecov-action@v6
        with:
          files: PYTHON/coverage.xml
          fail_ci_if_error: false

  # 2. Node Test (gate)
  node-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: SCRIPTS/package.json
      - name: Install dependencies
        run: cd SCRIPTS && npm ci
      - name: Run Jest
        run: cd SCRIPTS && npm test -- --coverage

  # 3. Build & Push Docker Image
  docker-publish:
    runs-on: ubuntu-latest
    needs: [python-test, node-test]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'main') }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # 4. Publish Python Package (PyPI)
  publish-pypi:
    runs-on: ubuntu-latest
    needs: [python-test]
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: pypi
      url: https://pypi.org/p/anatoliax-core
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine
      - name: Build package
        run: |
          cd PYTHON
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: PYTHON/dist/

  # 5. Deploy to Production
  deploy-prod:
    runs-on: ubuntu-latest
    needs: [docker-publish]
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: production
      url: https://anatoliax.example.com
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Kubernetes
        run: |
          echo "Deploying to production cluster..."
          # kubectl set image deployment/anatoliax-core \
          #   anatoliax-core=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
          #
          # Or use Helm:
          # helm upgrade anatoliax ./helm-chart \
          #   --set image.tag=${{ github.ref_name }} \
          #   --namespace anatoliax

      - name: Health check
        run: |
          echo "Waiting for deployment to be ready..."
          # kubectl rollout status deployment/anatoliax-core -n anatoliax --timeout=300s

      - name: Notify success
        run: |
          echo "Production deployment completed successfully!"
          echo "Version: ${{ github.ref_name }}"
          echo "Image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}"
