# CONFIG/hft_pro.yaml — HFT Pro modulu yapilandirmasi
hft_pro:
  clock:
    source: "tsc"  # tsc | monotonic | system
  ring_buffer:
    capacity: 65536
    dtype: "float64"
  event_loop:
    spin_mode: "busy"  # busy | adaptive | poll
    cpu_affinity: [2, 3]
  feed:
    udp_port: 12345
    multicast_group: "239.1.1.1"
  smart_router:
    alpha: 1.0
    beta: 1.0
    gamma: 0.1
    delta: 0.5
  kill_switch:
    shm_name: "/anatoliax_kill_switch"
    triggers:
      daily_loss_pct: 3.0
      drawdown_pct: 10.0
      consecutive_losses: 5
  latency:
    max_samples: 100000
    alert_p99_threshold_ns: 500000
  market_maker:
    base_spread: 0.02
    skew_factor: 1.0
    max_inventory: 10000
  gpu_pipeline:
    tick_buffer_size: 2000
    model_path: "models/regime_classifier.onnx"
