# ============================================================
# configmap.yaml — AnatoliaX Kubernetes ConfigMap
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: anatoliax-config
  namespace: anatoliax
  labels:
    app.kubernetes.io/name: anatoliax
data:
  # System
  NODE_ENV: "production"
  PYTHONUNBUFFERED: "1"

  # Database
  DATABASE_HOST: "anatoliax-postgres"
  DATABASE_PORT: "5432"
  DATABASE_NAME: "anatoliax"

  # Cache
  REDIS_HOST: "anatoliax-redis"
  REDIS_PORT: "6379"
  CHROMA_HOST: "anatoliax-chroma"
  CHROMA_PORT: "8000"
  CHROMA_PATH: "/app/chroma_db"
  SQLITE_PATH: "/app/data/anatoliax.db"

  # Trading Config
  AX_PAPER_TRADING: "true"
  AX_PAPER_INITIAL_CAPITAL: "100000"
  AX_MAX_POSITION_PER_SYMBOL: "0.02"
  AX_MAX_DAILY_LOSS: "0.03"
  AX_MIN_RR_RATIO: "2.0"
  AX_MAX_POSITIONS: "5"
  AX_MAX_RISK_PCT: "10"
  AX_SIGNAL_THRESHOLD: "70"

  # Data Sources
  AX_DATA_PRIMARY: "yahoo"
  AX_DATA_SECONDARY: "bigpara"
  AX_DATA_TERTIARY: "tradingview"

  # Risk
  AX_RISK_MODE: "strict"
  AX_KILL_SWITCH_DRAWDOWN: "0.05"
  AX_CIRCUIT_BREAKER_ERRORS: "5"

  # Execution
  AX_EXECUTION_MODE: "paper"
  AX_MAX_LATENCY_MS: "500"
  AX_ORDER_RETRY_COUNT: "3"

  # HFT
  AX_HFT_ENABLED: "false"
  AX_HFT_TICK_BUFFER: "100"

  # Logging
  LOG_LEVEL: "INFO"
  LOG_FORMAT: "json"

  # Monitoring
  PROMETHEUS_ENABLED: "true"
  PROMETHEUS_PORT: "9090"
  GRAFANA_ENABLED: "true"
  GRAFANA_PORT: "3000"
