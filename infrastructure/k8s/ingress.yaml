apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: anatoliax-ingress
  namespace: anatoliax
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - anatoliax.example.com
      secretName: anatoliax-tls
  rules:
    - host: anatoliax.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: anatoliax-core
                port:
                  number: 3001
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: anatoliax-core
                port:
                  number: 8080
          - path: /dashboard
            pathType: Prefix
            backend:
              service:
                name: anatoliax-core
                port:
                  number: 8081
