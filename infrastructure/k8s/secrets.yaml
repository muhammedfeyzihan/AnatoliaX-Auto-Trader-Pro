# ============================================================
# secrets.yaml — AnatoliaX Kubernetes Secrets (Template)
# UYARI: Gerçek değerleri buraya yazmayın, kubectl create secret kullanın
# ============================================================
apiVersion: v1
kind: Secret
metadata:
  name: anatoliax-secrets
  namespace: anatoliax
type: Opaque
stringData:
  # Placeholder values - use kubectl create secret for real values
  DATABASE_USER: "postgres"
  DATABASE_PASSWORD: "CHANGE_ME_IN_PROD"
  TELEGRAM_BOT_TOKEN: "CHANGE_ME_IN_PROD"
  TELEGRAM_CHAT_ID: "CHANGE_ME_IN_PROD"
  GRAFANA_ADMIN_PASSWORD: "CHANGE_ME_IN_PROD"
  API_KEY_HASH: "CHANGE_ME_IN_PROD"
  ENCRYPTION_KEY: "CHANGE_ME_IN_PROD"
---
# Kullanim ornegi (gercek komutlar):
# kubectl create secret generic anatoliax-secrets \
#   --from-literal=DATABASE_PASSWORD='gercek-sifre' \
#   --from-literal=TELEGRAM_BOT_TOKEN='bot-token' \
#   --from-literal=TELEGRAM_CHAT_ID='chat-id' \
#   -n anatoliax
