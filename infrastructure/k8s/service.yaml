# ============================================================
# service.yaml — AnatoliaX Kubernetes Services
# ============================================================
---
# Core Service
apiVersion: v1
kind: Service
metadata:
  name: anatoliax-core
  namespace: anatoliax
  labels:
    app.kubernetes.io/name: anatoliax
    app.kubernetes.io/component: core
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: anatoliax
      app.kubernetes.io/component: core
  ports:
    - name: http
      port: 3001
      targetPort: 3001
      protocol: TCP
    - name: ws
      port: 8080
      targetPort: 8080
      protocol: TCP
    - name: dashboard
      port: 8081
      targetPort: 8081
      protocol: TCP
---
# Prometheus Service
apiVersion: v1
kind: Service
metadata:
  name: anatoliax-prometheus
  namespace: anatoliax
  labels:
    app.kubernetes.io/name: prometheus
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: prometheus
  ports:
    - name: http
      port: 9090
      targetPort: 9090
      protocol: TCP
---
# Grafana Service
apiVersion: v1
kind: Service
metadata:
  name: anatoliax-grafana
  namespace: anatoliax
  labels:
    app.kubernetes.io/name: grafana
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: grafana
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      protocol: TCP
---
# Redis Service
apiVersion: v1
kind: Service
metadata:
  name: anatoliax-redis
  namespace: anatoliax
  labels:
    app.kubernetes.io/name: redis
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
      protocol: TCP
---
# PostgreSQL Service
apiVersion: v1
kind: Service
metadata:
  name: anatoliax-postgres
  namespace: anatoliax
  labels:
    app.kubernetes.io/name: postgresql
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: postgresql
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
      protocol: TCP
---
# ChromaDB Service
apiVersion: v1
kind: Service
metadata:
  name: anatoliax-chroma
  namespace: anatoliax
  labels:
    app.kubernetes.io/name: chromadb
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: chromadb
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      protocol: TCP
